<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADK Live Translator</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/app.js" type="module"></script>
  </head>

  <body>
    <header>
      <h1>ADK Live Translator</h1>
      <div class="subtitle">Real-time audio translation in 97 languages, powered by ADK Gemini Live API Toolkit</div>
      <div class="language-selector">
        <div class="custom-select" id="sourceLangWrapper">
          <button class="custom-select-trigger" id="sourceLangTrigger">English</button>
          <div class="custom-select-dropdown" id="sourceLangDropdown"></div>
          <input type="hidden" id="sourceLang" value="en">
        </div>
        <button class="lang-swap-btn" id="swapLangs" title="Swap languages">⇄</button>
        <div class="custom-select" id="targetLangWrapper">
          <button class="custom-select-trigger" id="targetLangTrigger">Japanese (日本語)</button>
          <div class="custom-select-dropdown" id="targetLangDropdown"></div>
          <input type="hidden" id="targetLang" value="ja">
        </div>
      </div>
      <div class="header-controls">
        <button id="toggleConsole" class="toggle-console-btn">Console</button>
        <div class="connection-status">
          <span class="status-indicator" id="statusIndicator"></span>
          <span id="statusText">Connecting...</span>
        </div>
      </div>
    </header>

    <div class="main-layout">
      <div class="container">
        <div id="messages"></div>

        <div class="input-container">
          <div class="input-wrapper">
            <button type="button" id="startAudioButton">Start Audio</button>
          </div>
        </div>
      </div>

      <div class="console-panel hidden" id="consolePanel">
        <div class="console-header">
          <h2>Event Console</h2>
          <div class="console-controls">
            <label class="console-checkbox">
              <input type="checkbox" id="showAudioEvents">
              <span>Show audio</span>
            </label>
            <button id="clearConsole" class="console-clear-btn">Clear</button>
          </div>
        </div>
        <div id="consoleContent" class="console-content"></div>
      </div>
    </div>
  </body>
</html>
